<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Money Tracking">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f3460">
<link rel="manifest" href="manifest.json">
<title>Money Tracking</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:system-ui,-apple-system,sans-serif;background:#f8f8f6;color:#1a1a1a;
  padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);
  padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right)}
.screen{display:none;height:100vh;height:100dvh;overflow:hidden;flex-direction:column}
.screen.active{display:flex}

/* PIN */
#pin-screen{background:linear-gradient(160deg,#0d1b3e,#0f3460 60%,#1a6a5a);align-items:center;justify-content:center}
.pin-box{width:100%;max-width:320px;padding:2rem 1.5rem;display:flex;flex-direction:column;align-items:center;gap:1rem}
.app-icon{width:90px;height:90px;border-radius:20px;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-size:48px;box-shadow:0 8px 24px rgba(0,0,0,0.3)}
.pin-name{font-size:22px;font-weight:700;color:#fff}
.pin-sub{font-size:13px;color:rgba(255,255,255,0.6)}
.pin-dots{display:flex;gap:14px}
.dot{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,0.4);background:transparent;transition:all 0.15s}
.dot.filled{background:#fff;border-color:#fff}
.dot.error{background:#e74c3c;border-color:#e74c3c}
.pin-err{font-size:13px;color:#e74c3c;height:18px;text-align:center;width:100%}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:250px}
.numpad button{height:60px;border-radius:50%;border:none;background:rgba(255,255,255,0.12);color:#fff;font-size:22px;font-weight:500;cursor:pointer;font-family:inherit;-webkit-appearance:none}
.numpad button:active{background:rgba(255,255,255,0.3)}
.numpad .del{font-size:18px;background:rgba(255,255,255,0.07)}
.numpad .emp{background:transparent;pointer-events:none}
.lang-row{display:flex;gap:8px}
.lb{padding:5px 14px;border:1.5px solid rgba(255,255,255,0.3);border-radius:20px;font-size:13px;cursor:pointer;background:transparent;font-family:inherit;color:rgba(255,255,255,0.6);-webkit-appearance:none}
.lb.active{border-color:#fff;color:#fff;background:rgba(255,255,255,0.15)}

/* APP */
#app-screen{background:#f8f8f6}
.topbar{background:linear-gradient(90deg,#0d1b3e,#0f3460);color:#fff;padding:11px 1rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:8px}
.topbar h1{font-size:15px;font-weight:700}
.topbar-r{display:flex;align-items:center;gap:6px}
.al{padding:3px 9px;border:1px solid rgba(255,255,255,0.3);border-radius:12px;font-size:12px;cursor:pointer;background:transparent;color:rgba(255,255,255,0.65);font-family:inherit;-webkit-appearance:none}
.al.active{background:rgba(255,255,255,0.18);color:#fff;border-color:rgba(255,255,255,0.6)}
.lo-btn{padding:4px 10px;border:1px solid rgba(255,255,255,0.3);border-radius:12px;font-size:12px;cursor:pointer;background:transparent;color:rgba(255,255,255,0.8);font-family:inherit;-webkit-appearance:none}
.app-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.wrap{max-width:900px;margin:0 auto;padding:1rem}
.tabs{display:flex;gap:2px;border-bottom:1px solid #e5e5e0;margin-bottom:1.25rem;overflow-x:auto}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:8px 13px;font-size:13px;cursor:pointer;border:none;background:none;color:#888;border-bottom:2px solid transparent;font-family:inherit;font-weight:500;white-space:nowrap;-webkit-appearance:none}
.tab.active{color:#0f3460;border-bottom:2px solid #0f3460}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:1.25rem}
.metric{background:#f0f0ec;border-radius:8px;padding:12px 14px}
.ml{font-size:12px;color:#888;margin-bottom:4px}
.mv{font-size:17px;font-weight:600}
.mv.inc{color:#1a7a4a}.mv.exp{color:#c0392b}.mv.pos{color:#1a7a4a}.mv.neg{color:#c0392b}
.stitle{font-size:11px;font-weight:600;color:#aaa;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.05em}
.card{background:#fff;border:1px solid #e5e5e0;border-radius:12px;padding:1rem;margin-bottom:1.25rem}
.fr{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:10px}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:12px;color:#888;font-weight:500}
.fg input,.fg select{font-size:14px;padding:9px 10px;border:1px solid #ddd;border-radius:8px;background:#f8f8f6;color:#1a1a1a;font-family:inherit;-webkit-appearance:none}
.fg input:focus,.fg select:focus{outline:none;border-color:#0f3460;background:#fff}
.btn{padding:9px 16px;border-radius:8px;font-size:14px;cursor:pointer;border:1px solid #ddd;background:#fff;color:#1a1a1a;font-family:inherit;font-weight:500;-webkit-appearance:none}
.btn:active{opacity:0.75}
.btn.p{background:linear-gradient(90deg,#0d1b3e,#0f3460);color:#fff;border:none}
.btn.s{color:#1a7a4a;border-color:#a8d5b8}.btn.s:active{background:#eaf6ef}
.btn.d{color:#c0392b;border-color:#f5c6c0}.btn.d:active{background:#fdf0ee}
.brow{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.fbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem;align-items:center}
.fbar select,.fbar input{font-size:13px;padding:7px 10px;border:1px solid #ddd;border-radius:8px;background:#f8f8f6;color:#1a1a1a;font-family:inherit;-webkit-appearance:none}
.badge{display:inline-block;font-size:11px;padding:2px 7px;border-radius:5px;font-weight:600;white-space:nowrap}
.badge.cash{background:#fef3d0;color:#a07000}
.badge.bank{background:#deeef9;color:#1a5a8a}
.badge.in{background:#d8f0e4;color:#1a6a3a}
.badge.out{background:#fde8e6;color:#a0291e}
.badge.USD,.badge.KHR{background:#f0f0ec;color:#666;border:1px solid #ddd}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:7px 8px;font-size:11px;font-weight:600;color:#aaa;border-bottom:1px solid #e5e5e0;white-space:nowrap}
td{padding:7px 8px;border-bottom:1px solid #f0f0ec;vertical-align:middle}
tr:last-child td{border-bottom:none}
.ai{color:#1a7a4a;font-weight:600}.ao{color:#c0392b;font-weight:600}
.ei{font-size:13px;padding:4px 7px;border:1px solid #ddd;border-radius:6px;background:#f8f8f6;color:#1a1a1a;font-family:inherit}
.empty{text-align:center;padding:3rem;color:#bbb;font-size:14px}
.tt{display:flex;gap:4px}
.tb{padding:8px 16px;font-size:13px;cursor:pointer;border:1px solid #ddd;background:#f8f8f6;color:#888;border-radius:8px;font-family:inherit;font-weight:500;-webkit-appearance:none}
.tb.in.active{background:#d8f0e4;color:#1a6a3a;border-color:#a8d5b8}
.tb.out.active{background:#fde8e6;color:#a0291e;border-color:#f5c6c0}
.tw{overflow-x:auto;-webkit-overflow-scrolling:touch}
#fmsg{margin-top:8px;font-size:13px;display:none}
.urow,.crow{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid #f0f0ec;font-size:13px}
.urow:last-child,.crow:last-child{border-bottom:none}
@keyframes shake{0%,100%{transform:translateX(0)}25%,75%{transform:translateX(-8px)}50%{transform:translateX(8px)}}
.shake{animation:shake 0.4s ease}
</style>
</head>
<body>

<!-- PIN SCREEN -->
<div class="screen active" id="pin-screen">
  <div class="pin-box">
    <div class="lang-row">
      <button class="lb active" id="ll-en" onclick="setLang('en')">English</button>
      <button class="lb" id="ll-km" onclick="setLang('km')">&#x1781;&#x17D2;&#x1798;&#x17C2;&#x179A;</button>
    </div>
    <div class="app-icon">&#128200;</div>
    <div class="pin-name">Samnang</div>
    <div class="pin-sub" id="pin-sub">Enter your PIN</div>
    <div class="pin-dots" id="pin-dots">
      <div class="dot" id="d0"></div><div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div><div class="dot" id="d3"></div>
    </div>
    <div class="pin-err" id="pin-err"></div>
    <div class="numpad">
      <button onclick="pk('1')">1</button><button onclick="pk('2')">2</button><button onclick="pk('3')">3</button>
      <button onclick="pk('4')">4</button><button onclick="pk('5')">5</button><button onclick="pk('6')">6</button>
      <button onclick="pk('7')">7</button><button onclick="pk('8')">8</button><button onclick="pk('9')">9</button>
      <button class="emp" disabled></button><button onclick="pk('0')">0</button>
      <button class="del" onclick="pd()">&#9003;</button>
    </div>
  </div>
</div>

<!-- APP SCREEN -->
<div class="screen" id="app-screen">
  <div class="topbar">
    <div class="topbar-left">
      <span style="font-size:20px">&#128200;</span>
      <h1 id="at-h">Money Tracking</h1>
    </div>
    <div class="topbar-r">
      <button class="al active" id="al-en" onclick="setLang('en')">EN</button>
      <button class="al" id="al-km" onclick="setLang('km')">KM</button>
      <button class="lo-btn" onclick="lockApp()">&#128274;</button>
    </div>
  </div>
  <div class="app-body">
    <div class="wrap">
      <div class="tabs">
        <button class="tab active" id="tb-add" onclick="showTab('add')">+ Add</button>
        <button class="tab" id="tb-tx" onclick="showTab('tx')">Transactions</button>
        <button class="tab" id="tb-sum" onclick="showTab('sum')">Summary</button>
        <button class="tab" id="tb-set" onclick="showTab('set')">Settings</button>
      </div>

      <!-- ADD -->
      <div id="pn-add">
        <div class="card">
          <div class="fr" style="margin-bottom:12px">
            <div class="fg" style="grid-column:1/-1">
              <label id="lb-flow">Flow</label>
              <div class="tt">
                <button class="tb in active" id="bi" onclick="setType('in')">&#9660; Money in</button>
                <button class="tb out" id="bo" onclick="setType('out')">&#9650; Money out</button>
              </div>
            </div>
          </div>
          <div class="fr">
            <div class="fg"><label id="lb-dt">Date</label><input type="date" id="fd"></div>
            <div class="fg"><label id="lb-cu">Currency</label>
              <select id="fcu"><option value="USD">USD ($)</option><option value="KHR">KHR (&#x17DB;)</option></select>
            </div>
            <div class="fg"><label id="lb-am">Amount</label><input type="number" id="fam" placeholder="0.00" min="0" step="0.01" inputmode="decimal"></div>
          </div>
          <div class="fr">
            <div class="fg"><label id="lb-me">Method</label>
              <select id="fme"><option value="bank" id="ob">Bank</option><option value="cash" id="oc">Cash</option></select>
            </div>
            <div class="fg"><label id="lb-ca">Category</label><select id="fca"></select></div>
            <div class="fg"><label id="lb-de">Note</label><input type="text" id="fde" placeholder="Optional"></div>
          </div>
          <div class="brow" style="margin-top:8px">
            <button class="btn p" id="bs" onclick="addTx()">&#10003; Save</button>
            <button class="btn" id="bc" onclick="clrForm()">Clear</button>
          </div>
          <div id="fmsg"></div>
        </div>
      </div>

      <!-- TRANSACTIONS -->
      <div id="pn-tx" style="display:none">
        <div class="fbar">
          <select id="fp" onchange="renderTx()">
            <option value="1m" id="p1m">Last 1 month</option>
            <option value="3m" id="p3m">Last 3 months</option>
            <option value="6m" id="p6m">Last 6 months</option>
            <option value="1y" id="p1y">Last 1 year</option>
            <option value="all" id="pall">All time</option>
          </select>
          <select id="ft" onchange="renderTx()">
            <option value="all" id="fall">All flows</option>
            <option value="in" id="fin">Money in</option>
            <option value="out" id="fou">Money out</option>
          </select>
          <select id="fc" onchange="renderTx()">
            <option value="all" id="fcall">All currencies</option>
            <option value="USD">USD</option><option value="KHR">KHR</option>
          </select>
          <select id="fm" onchange="renderTx()">
            <option value="all" id="fmall">All methods</option>
            <option value="bank" id="ob2">Bank</option>
            <option value="cash" id="oc2">Cash</option>
          </select>
          <select id="fcat" onchange="renderTx()"></select>
          <input type="text" id="fsr" oninput="renderTx()" placeholder="Search..." style="min-width:90px">
        </div>
        <div class="brow" style="margin-bottom:1rem">
          <button class="btn s" onclick="exXL(false)">&#8595; Excel</button>
          <button class="btn d" onclick="exPDF(false)">&#8595; PDF</button>
          <span id="txc" style="font-size:13px;color:#aaa;margin-left:4px"></span>
        </div>
        <div class="tw">
          <table>
            <thead><tr>
              <th id="hdt">Date</th><th id="hca">Category</th><th id="hde">Note</th>
              <th id="hme">Method</th><th>Cur.</th><th id="hfl">Flow</th><th id="ham">Amount</th><th></th>
            </tr></thead>
            <tbody id="txb"></tbody>
          </table>
          <div id="txe" class="empty" style="display:none">
            <div style="font-size:32px;margin-bottom:8px">&#128237;</div>
            <span id="notx">No transactions</span>
          </div>
        </div>
      </div>

      <!-- SUMMARY -->
      <div id="pn-sum" style="display:none">
        <div class="fbar">
          <select id="sp" onchange="renderSum()">
            <option value="1m" id="sp1m">Last 1 month</option>
            <option value="3m" id="sp3m">Last 3 months</option>
            <option value="6m" id="sp6m">Last 6 months</option>
            <option value="1y" id="sp1y">Last 1 year</option>
            <option value="all" id="spall">All time</option>
          </select>
          <button class="btn s" onclick="exXL(true)">&#8595; Excel</button>
          <button class="btn d" onclick="exPDF(true)">&#8595; PDF</button>
        </div>
        <div id="sumc"></div>
      </div>

      <!-- SETTINGS -->
      <div id="pn-set" style="display:none">
        <div class="card">
          <div class="stitle" id="set-pin-t">Change PIN</div>
          <p style="font-size:13px;color:#888;margin-bottom:12px" id="set-pin-s">Enter new 4-digit PIN</p>
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            <input type="password" id="new-pin" maxlength="4" inputmode="numeric" pattern="[0-9]*"
              style="font-size:24px;letter-spacing:8px;width:110px;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-family:inherit;background:#f8f8f6;text-align:center">
            <button class="btn p" id="set-pin-btn" onclick="changePIN()">Save PIN</button>
          </div>
          <div id="pcmsg" style="margin-top:8px;font-size:13px;display:none"></div>
        </div>
        <div class="card">
          <div class="stitle" id="cat-t">Manage Categories</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:flex-end">
            <div class="fg" style="flex:1;min-width:110px">
              <label>Name (EN)</label>
              <input type="text" id="nce" placeholder="e.g. Gym">
            </div>
            <div class="fg" style="flex:1;min-width:110px">
              <label>&#x1794;&#x17D2;&#x179A;&#x1797;&#x17C1;&#x178F; (KM)</label>
              <input type="text" id="nck" placeholder="e.g. &#x1780;&#x17B8;&#x179B;&#x17B6;">
            </div>
            <div class="fg" style="min-width:110px">
              <label>Group</label>
              <select id="ncg">
                <option value="Salary">Salary</option>
                <option value="Family">Family</option>
                <option value="Health">Health</option>
                <option value="Food">Food &amp; Daily</option>
                <option value="Loans">Loans</option>
                <option value="Festivals">Festivals</option>
                <option value="Other" selected>Other</option>
              </select>
            </div>
            <button class="btn p" onclick="addCat()">+ Add</button>
          </div>
          <div id="cat-list"></div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────
var PIN_KEY='cf_pin', TX_KEY='cf_tx', CAT_KEY='cf_cats', LANG_KEY='cf_lang';
var DPIN='1234';
var BC=[
  {k:'Salary-MTW',e:'Salary-MTW',m:'ប្រាកខែ-MTW',g:'Salary'},

  {k:'Salary-Wife',e:'Salary-Wife',m:'ប្រាកខែ-ប្រភន្ធ',g:'Salary'},
  {k:'Mom Salary',e:'Mom Salary',m:'ប្រាកខែម្តែ',g:'Family'},

  {k:'Sasda Tuition',e:'Sasda Tuition',m:'បង់សាលា-សាស្តា',g:'Family'},
  {k:'Sasda Other',e:'Sasda Other Expenses',m:'ចំណាយផ្សេង័-សាស្តា',g:'Family'},
  {k:'Hanan',e:'Hanan',m:'ហាណាន់',g:'Family'},
  {k:"Wife's Expenses",e:"Wife's Expenses",m:'ចំណាយប្រភន្ធ',g:'Family'},
  {k:'Treatment',e:'Treatment',m:'ការព្យាបាល',g:'Health'},
  {k:'Vaccination',e:'Vaccination',m:'ចាកវឺក់សាំង',g:'Health'},
  {k:'NSSF',e:'NSSF Health Insurance',m:'ធានារ័ហ់រង NSSF',g:'Health'},

  {k:'Coffee',e:'Coffee',m:'កាហ្វេ',g:'Food'},
  {k:'Car Loan',e:'Car Loan',m:'ប្រាកកម្ចីរថយន្ត',g:'Loans'},
  {k:'Land Loan',e:'Land Loan',m:'ប្រាកកម្ចីដី',g:'Loans'},
  {k:'Phcum Ben',e:'Phcum Ben Day',m:'បុណ្យភ្ជុំបិណ្ឌ',g:'Festivals'},
  {k:'Khmer NY',e:'Khmer New Year',m:'បុណ្យចូលឆ្នាំខ្មែរ',g:'Festivals'},
  {k:'Water Fest',e:'Water Festival Day',m:'បុណ្យអ៊ុំតូក',g:'Festivals'},
  {k:'Petrol',e:'Petrol',m:'សាំង',g:'Other'},
  {k:'Clothes',e:'Clothes',m:'សម្លឹកបំពាក់',g:'Other'},
  {k:'Giving',e:'Giving',m:'ការអាច',g:'Other'},
  {k:'Offering',e:'Offering',m:'ថ្វាយប្រាកដង្វាយ',g:'Other'},
  {k:'Others',e:'Others',m:'ផ្សេង័',g:'Other'}
];
var GL={en:{Salary:'Salary',Family:'Family',Health:'Health',Food:'Food & Daily',Loans:'Loans',Festivals:'Festivals',Other:'Other'},
  km:{Salary:'ប្រាកខែ',Family:'គ្រួសារ',Health:'សុខភាព',Food:'អាហារ',Loans:'ប្រាកកម្ចី',Festivals:'បុណ្យ',Other:'ផ្សេង័'}};
var TR={en:{h:'Money Tracking',ps:'Enter your PIN',bi:'▼ Money in',bo:'▲ Money out',lf:'Flow',ld:'Date',lc:'Currency',la:'Amount',lm:'Method',lk:'Category',ln:'Note',bs:'✓ Save',bc:'Clear',ok:'Saved!',er:'Enter valid date & amount.',ob:'Bank',oc:'Cash',p1m:'Last 1 month',p3m:'Last 3 months',p6m:'Last 6 months',p1y:'Last 1 year',pa:'All time',fa:'All flows',fi:'Money in',fo:'Money out',ca:'All currencies',ma:'All methods',sr:'Search...',hd:'Date',hc:'Category',hn:'Note',hm:'Method',hf:'Flow',ha:'Amount',nt:'No transactions',ti:'Total in',to:'Total out',ne:'Net',sb:'Bank',sc:'Cash',sp:'Payment Method',sk:'By Category',ck:'All categories',cd:'Delete this transaction?',st:'Change PIN',ss:'Enter new 4-digit PIN',sb2:'Save PIN',po:'PIN updated!',pe:'PIN must be 4 digits.',pw:'Wrong PIN. Try again.',ct:'Manage Categories',

var L='en',TX=[],CC=[],ctype='in',eid=null,pe='',unlocked=false;

function t(k){return (TR[L][k]!==undefined?TR[L][k]:(TR.en[k]||k));}
function cl(k){var c=AC().find(function(x){return x.k===k;});return c?(L==='km'?c.m:c.e):k;}
function AC(){return BC.concat(CC);}
function gp(){return localStorage.getItem(PIN_KEY)||DPIN;}
function sp2(p){localStorage.setItem(PIN_KEY,p);}
function lTX(){try{var r=localStorage.getItem(TX_KEY);TX=r?JSON.parse(r):[];}catch(e){TX=[];}}
function sTX(){try{localStorage.setItem(TX_KEY,JSON.stringify(TX));}catch(e){}}
function lCC(){try{var r=localStorage.getItem(CAT_KEY);CC=r?JSON.parse(r):[];}catch(e){CC=[];}}
function sCC(){localStorage.setItem(CAT_KEY,JSON.stringify(CC));}
function sv(id,k){var e=document.getElementById(id);if(e)e.textContent=t(k);}
function sh(id,k){var e=document.getElementById(id);if(e)e.placeholder=t(k);}

function setLang(l){

// ── PIN ────────────────────────────────────────────────────────
function pk(k){
  if(pe.length>=4)return;
  pe+=k;ud();
  if(pe.length===4)setTimeout(ck2,80);
}
function pd(){
  pe=pe.slice(0,-1);ud();
  document.getElementById('pin-err').textContent='';
  document.getElementById('pin-dots').classList.remove('shake');
}
function ud(state){
  for(var i=0;i<4;i++){
    var d=document.getElementById('d'+i);d.className='dot';
    if(state==='err')d.classList.add('error');
    else if(i<pe.length)d.classList.add('filled');
  }
}
function ck2(){
  if(pe===gp()){
    unlocked=true;
    document.getElementById('pin-screen').classList.remove('active');
    document.getElementById('app-screen').classList.add('active');
    pe='';ud();lTX();applyTR();bldCats();renderTx();renderSum();renderCatList();
    document.getElementById('fd').value=new Date().toISOString().split('T')[0];
  } else {
    document.getElementById('pin-err').textContent=t('pw');
    document.getElementById('pin-dots').classList.add('shake');
    ud('err');pe='';
    setTimeout(function(){ud();document.getElementById('pin-dots').classList.remove('shake');},600);
  }
}
function lockApp(){
  unlocked=false;
  document.getElementById('app-screen').classList.remove('active');
  document.getElementById('pin-screen').classList.add('active');
  pe='';ud();document.getElementById('pin-err').textContent='';
}
function changePIN(){
  var np=document.getElementById('new-pin').value.trim();
  var msg=document.getElementById('pcmsg');
  if(!/^\d{4}$/.test(np)){
    msg.style.color='#c0392b';msg.textContent=t('pe');msg.style.display='block';
    setTimeout(function(){msg.style.display='none';},2500);return;
  }
  sp2(np);document.getElementById('new-pin').value='';
  msg.style.color='#1a7a4a';msg.textContent=t('po');msg.style.display='block';
  setTimeout(function(){msg.style.display='none';},2500);
}

function showTab(n){
  ['add','tx','sum','set'].forEach(function(x){
    var e=document.getElementById('pn-'+x);if(e)e.style.display=x===n?'block':'none';

// ── CATS ───────────────────────────────────────────────────────
function bldCats(){
  var cats=AC();var grps=['Salary','Family','Health','Food','Loans','Festivals','Other'];
  function build(wa){
    var h=wa?'<option value="all">'+t('ck')+'</option>':'';
    grps.forEach(function(g){
      var gc=cats.filter(function(c){return c.g===g;});if(!gc.length)return;
      h+='<optgroup label="'+(GL[L][g]||g)+'">';
      gc.forEach(function(c){h+='<option value="'+c.k+'">'+(L==='km'?c.m:c.e)+'</option>';});
      h+='</optgroup>';
    });return h;
  }
  document.getElementById('fca').innerHTML=build(false);
  document.getElementById('fcat').innerHTML=build(true);
}
function catOpts(sel){
  var cats=AC();var grps=['Salary','Family','Health','Food','Loans','Festivals','Other'];var h='';
  grps.forEach(function(g){
    var gc=cats.filter(function(c){return c.g===g;});if(!gc.length)return;
    h+='<optgroup label="'+(GL[L][g]||g)+'">';
    gc.forEach(function(c){h+='<option value="'+c.k+'"'+(c.k===sel?' selected':'')+'>'+(L==='km'?c.m:c.e)+'</option>';});
    h+='</optgroup>';
  });return h;
}
function addCat(){
  var en=document.getElementById('nce').value.trim();
  var km=document.getElementById('nck').value.trim();
  var grp=document.getElementById('ncg').value;
  if(!en){alert('Please enter a name.');return;}
  CC.push({k:'c'+Date.now(),e:en,m:km||en,g:grp,custom:true});
  sCC();document.getElementById('nce').value='';document.getElementById('nck').value='';
  bldCats();renderCatList();
}
function delCat(k){
  if(!confirm('Delete this category?'))return;
  CC=CC.filter(function(c){return c.k!==k;});sCC();bldCats();renderCatList();
}
function renderCatList(){
  var el=document.getElementById('cat-list');if(!el)return;
  var cats=AC();var grps=['Salary','Family','Health','Food','Loans','Festivals','Other'];var html='';
  grps.forEach(function(g){
    var gc=cats.filter(function(c){return c.g===g;});if(!gc.length)return;
    html+='<div style="font-size:11px;font-weight:600;color:#aaa;text-transform:uppercase;margin:8px 0 3px">'+(GL[L][g]||g)+'</div>';
    gc.forEach(function(c){
      html+='<div class="crow"><span>'+(L==='km'?c.m:c.e)+'</span>'+(c.custom?'<button class="btn d" style="padding:3px 8px;font-size:11px" onclick="delCat(''+c.k+'')">&#128465;</button>':'<span style="font-size:10px;color:#ccc">default</span>')+'</div>';
    });

// ── TRANSACTIONS ───────────────────────────────────────────────
function addTx(){
  var date=document.getElementById('fd').value;
  var cur=document.getElementById('fcu').value;
  var amt=parseFloat(document.getElementById('fam').value);
  var method=document.getElementById('fme').value;
  var cat=document.getElementById('fca').value;
  var desc=document.getElementById('fde').value.trim();
  if(!date||isNaN(amt)||amt<=0){fmsg(t('er'),true);return;}
  TX.unshift({id:Date.now(),date:date,currency:cur,amount:amt,method:method,category:cat,desc:desc,type:ctype});
  sTX();fmsg(t('ok'),false);
  document.getElementById('fam').value='';document.getElementById('fde').value='';
}
function fmsg(msg,err){
  var e=document.getElementById('fmsg');
  e.style.color=err?'#c0392b':'#1a7a4a';e.textContent=msg;e.style.display='block';
  setTimeout(function(){e.style.display='none';},2500);
}
function clrForm(){
  document.getElementById('fam').value='';document.getElementById('fde').value='';
  document.getElementById('fd').value=new Date().toISOString().split('T')[0];
}
function bnd(p){
  var n=new Date();
  if(p==='1m'){var d=new Date(n);d.setMonth(d.getMonth()-1);return d;}
  if(p==='3m'){var d=new Date(n);d.setMonth(d.getMonth()-3);return d;}
  if(p==='6m'){var d=new Date(n);d.setMonth(d.getMonth()-6);return d;}
  if(p==='1y'){var d=new Date(n);d.setFullYear(d.getFullYear()-1);return d;}
  return null;
}
function fltTX(p,tp,cu,me,ca,sr){
  var b=bnd(p);
  return TX.filter(function(x){
    if(b&&new Date(x.date)<b)return false;
    if(tp!=='all'&&x.type!==tp)return false;
    if(cu!=='all'&&x.currency!==cu)return false;
    if(me!=='all'&&x.method!==me)return false;
    if(ca!=='all'&&x.category!==ca)return false;
    if(sr&&!(x.desc+cl(x.category)).toLowerCase().includes(sr.toLowerCase()))return false;
    return true;
  });
}
function fmt(x){
  if(x.currency==='USD')return '$'+x.amount.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2});
  return '៛'+Math.round(x.amount).toLocaleString('en');
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function gTxF(){
  return fltTX(document.getElementById('fp').value,document.getElementById('ft').value,
    document.getElementById('fc').value,document.getElementById('fm').value,
    document.getElementById('fcat').value,document.getElementById('fsr').value);
}
function renderTx(){
  if(!unlocked)return;
  var rows=gTxF();
  document.getElementById('txc').textContent=t('txn')(rows.length);
  var body=document.getElementById('txb'),empty=document.getElementById('txe');
  if(!rows.length){body.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  body.innerHTML=rows.map(function(x){
    if(eid===x.id)return eRow(x);
    return '<tr><td style="white-space:nowrap">'+x.date+'</td>'
      +'<td style="max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(cl(x.category))+'</td>'
      +'<td style="max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(x.desc)+'</td>'
      +'<td><span class="badge '+x.method+'">'+(x.method==='bank'?t('ob'):t('oc'))+'</span></td>'
      +'<td><span class="badge '+x.currency+'">'+x.currency+'</span></td>'
      +'<td><span class="badge '+x.type+'">'+(x.type==='in'?t('fi'):t('fo'))+'</span></td>'
      +'<td class="'+(x.type==='in'?'ai':'ao')+'" style="white-space:nowrap">'+fmt(x)+'</td>'
      +'<td style="white-space:nowrap"><button class="btn" style="padding:4px 7px;font-size:12px" onclick="stEdit('+x.id+')">&#9998;</button>'
      +' <button class="btn" style="padding:4px 7px;font-size:12px;color:#c0392b" onclick="dlTx('+x.id+')">&#128465;</button></td></tr>';
  }).join('');
}
function eRow(x){
  return '<tr style="background:#fafaf8">'
    +'<td><input class="ei" type="date" id="ed" value="'+x.date+'" style="width:118px"></td>'
    +'<td><select class="ei" id="eca" style="width:130px">'+catOpts(x.category)+'</select></td>'
    +'<td><input class="ei" type="text" id="ede" value="'+esc(x.desc)+'" style="width:100px"></td>'
    +'<td><select class="ei" id="eme" style="width:85px"><option value="bank"'+(x.method==='bank'?' selected':'')+'>'+t('ob')+'</option><option value="cash"'+(x.method==='cash'?' selected':'')+'>'+t('oc')+'</option></select></td>'
    +'<td><select class="ei" id="ecu" style="width:62px"><option value="USD"'+(x.currency==='USD'?' selected':'')+'>USD</option><option value="KHR"'+(x.currency==='KHR'?' selected':'')+'>KHR</option></select></td>'
    +'<td><select class="ei" id="ety" style="width:85px"><option value="in"'+(x.type==='in'?' selected':'')+'>'+t('fi')+'</option><option value="out"'+(x.type==='out'?' selected':'')+'>'+t('fo')+'</option></select></td>'
    +'<td><input class="ei" type="number" id="eam" value="'+x.amount+'" min="0" step="0.01" style="width:84px" inputmode="decimal"></td>'
    +'<td style="white-space:nowrap"><button class="btn p" style="padding:4px 7px;font-size:12px" onclick="svEdit('+x.id+')">&#10003;</button>'
    +' <button class="btn" style="padding:4px 7px;font-size:12px" onclick="clEdit()">&#10005;</button></td></tr>';
}
function stEdit(id){eid=id;renderTx();}
function clEdit(){eid=null;renderTx();}
function svEdit(id){
  var i=TX.findIndex(function(x){return x.id===id;});if(i<0)return;
  var amt=parseFloat(document.getElementById('eam').value);if(isNaN(amt)||amt<=0)return;
  TX[i]=Object.assign({},TX[i],{
    date:document.getElementById('ed').value,
    category:document.getElementById('eca').value,
    desc:document.getElementById('ede').value,
    method:document.getElementById('eme').value,
    currency:document.getElementById('ecu').value,
    type:document.getElementById('ety').value,
    amount:amt
  });
  eid=null;sTX();renderTx();
}
function dlTx(id){
  if(!confirm(t('cd')))return;
  TX=TX.filter(function(x){return x.id!==id;});sTX();renderTx();
}

    +'<div class="metric"><div class="ml">'+t('ti')+'</div><div class="mv inc">៛'+Math.round(kI).toLocaleString('en')+'</div></div>'

    +'<div class="metric"><div class="ml">'+t('ne')+'</div><div class="mv '+(kN>=0?'pos':'neg')+'">'+(kN>=0?'+':'')+'៛'+Math.round(kN).toLocaleString('en')+'</div></div></div>'
    +'<p class="stitle" style="margin-top:1.25rem">'+t('sp')+'</p><div class="sg">'
    +'<div class="metric"><div class="ml">'+t('sb')+'</div><div class="mv">'+bk+'</div></div>'
    +'<div class="metric"><div class="ml">'+t('sc')+'</div><div class="mv">'+ca+'</div></div></div>'
    +'<p class="stitle" style="margin-top:1.25rem">'+t('sk')+'</p>'
    +'<div class="tw"><table><thead><tr><th>'+t('hc')+'</th><th>USD In</th><th>USD Out</th><th>KHR In</th><th>KHR Out</th></tr></thead>'
    +'<tbody>'+(cr||'<tr><td colspan="5" style="text-align:center;color:#bbb;padding:1.5rem">-</td></tr>')+'</tbody></table></div>';
}

// ── EXPORT ─────────────────────────────────────────────────────
function exXL(fs){
  var data=fs?gSumF():gTxF();if(!data.length){alert(t('nt'));return;}
  var rows=[[t('hd'),t('hc'),t('hn'),t('hm'),'Cur.',t('hf'),t('ha')]];
  data.forEach(function(x){rows.push([x.date,cl(x.category),x.desc,x.method==='bank'?t('ob'):t('oc'),x.currency,x.type==='in'?t('fi'):t('fo'),x.amount]);});
  var ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[12,22,24,10,6,8,14].map(function(w){return{wch:w};});
  var wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Transactions');
  XLSX.writeFile(wb,'cashflow_'+new Date().toISOString().split('T')[0]+'.xlsx');
}
function exPDF(fs){
  var data=fs?gSumF():gTxF();if(!data.length){alert(t('nt'));return;}
  var rows=data.map(function(x){
    return '<tr><td>'+x.date+'</td><td>'+esc(cl(x.category))+'</td><td>'+esc(x.desc)+'</td>'
      +'<td>'+(x.method==='bank'?t('ob'):t('oc'))+'</td><td>'+x.currency+'</td>'
      +'<td>'+(x.type==='in'?t('fi'):t('fo'))+'</td>'
      +'<td style="text-align:right;color:'+(x.type==='in'?'#1a7a4a':'#c0392b')+'">'+fmt(x)+'</td></tr>';
  }).join('');
  var html='<!DOCTYPE html><html><head><meta charset="utf-8"><title>Cashflow</title>'
    +'<style>body{font-family:Arial,sans-serif;font-size:11px;padding:20px}h1{font-size:16px;font-weight:600;margin-bottom:4px}p{color:#888;font-size:10px;margin-bottom:14px}table{width:100%;border-collapse:collapse}th{background:#f5f5f2;padding:6px 8px;text-align:left;font-size:10px;border-bottom:1px solid #ddd}td{padding:5px 8px;border-bottom:0.5px solid #eee}</style>'
    +'</head><body><h1>Money Tracking</h1><p>'+new Date().toLocaleDateString('en-GB')+' &middot; '+t('txn')(data.length)+'</p>'
    +'<table><thead><tr><th>'+t('hd')+'</th><th>'+t('hc')+'</th><th>'+t('hn')+'</th><th>'+t('hm')+'</th><th>Cur.</th><th>'+t('hf')+'</th><th>'+t('ha')+'</th></tr></thead>'
    +'<tbody>'+rows+'</tbody></table>'
    +'<script>window.onload=function(){window.print();}<\/script></body></html>';
  var w=window.open('','_blank');if(w){w.document.write(html);w.document.close();}
}
