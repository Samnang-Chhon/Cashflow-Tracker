<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cashflow Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f8f8f6;color:#1a1a1a;min-height:100vh}
.container{max-width:900px;margin:0 auto;padding:1.5rem 1rem}
header{margin-bottom:2rem}
header h1{font-size:22px;font-weight:600;color:#1a1a1a}
header p{font-size:13px;color:#888;margin-top:2px}
.tabs{display:flex;gap:4px;border-bottom:1px solid #e5e5e0;margin-bottom:1.5rem}
.tab{padding:8px 16px;font-size:14px;cursor:pointer;border:none;background:none;color:#888;border-bottom:2px solid transparent;font-family:inherit;font-weight:500}
.tab.active{color:#1a1a1a;border-bottom:2px solid #1a1a1a}
.tab:hover{color:#1a1a1a}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:1.5rem}
.metric{background:#f0f0ec;border-radius:8px;padding:12px 14px}
.metric-label{font-size:12px;color:#888;margin-bottom:4px}
.metric-value{font-size:18px;font-weight:600;color:#1a1a1a}
.metric-value.income{color:#1a7a4a}
.metric-value.expense{color:#c0392b}
.metric-value.pos{color:#1a7a4a}
.metric-value.neg{color:#c0392b}
.section-title{font-size:11px;font-weight:600;color:#aaa;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.06em}
.form-card{background:#fff;border:1px solid #e5e5e0;border-radius:12px;padding:1.25rem;margin-bottom:1.5rem}
.form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:10px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:12px;color:#888;font-weight:500}
.form-group input,.form-group select{font-size:14px;padding:8px 10px;border:1px solid #ddd;border-radius:8px;background:#f8f8f6;color:#1a1a1a;font-family:inherit}
.form-group input:focus,.form-group select:focus{outline:none;border-color:#999;background:#fff}
.btn{padding:8px 16px;border-radius:8px;font-size:14px;cursor:pointer;border:1px solid #ddd;background:#fff;color:#1a1a1a;font-family:inherit;font-weight:500;transition:background 0.15s}
.btn:hover{background:#f0f0ec}
.btn.primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.btn.primary:hover{background:#333}
.btn.success{color:#1a7a4a;border-color:#a8d5b8}
.btn.success:hover{background:#eaf6ef}
.btn.danger-btn{color:#c0392b;border-color:#f5c6c0}
.btn.danger-btn:hover{background:#fdf0ee}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem;align-items:center}
.filter-bar select,.filter-bar input{font-size:13px;padding:6px 10px;border:1px solid #ddd;border-radius:8px;background:#f8f8f6;color:#1a1a1a;font-family:inherit}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:6px;font-weight:600;white-space:nowrap}
.badge.cash{background:#fef3d0;color:#a07000}
.badge.bank{background:#deeef9;color:#1a5a8a}
.badge.in{background:#d8f0e4;color:#1a6a3a}
.badge.out{background:#fde8e6;color:#a0291e}
.badge.usd,.badge.khr{background:#f0f0ec;color:#666;border:1px solid #ddd}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;font-size:11px;font-weight:600;color:#aaa;border-bottom:1px solid #e5e5e0;white-space:nowrap;text-transform:uppercase;letter-spacing:0.04em}
td{padding:8px 10px;border-bottom:1px solid #f0f0ec;color:#1a1a1a;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf8}
.amount-in{color:#1a7a4a;font-weight:600}
.amount-out{color:#c0392b;font-weight:600}
.edit-input{font-size:13px;padding:4px 8px;border:1px solid #ddd;border-radius:6px;background:#f8f8f6;color:#1a1a1a;font-family:inherit}
.empty{text-align:center;padding:3rem;color:#bbb;font-size:14px}
.empty-icon{font-size:36px;display:block;margin-bottom:8px}
.type-toggle{display:flex;gap:4px}
.type-btn{padding:7px 16px;font-size:13px;cursor:pointer;border:1px solid #ddd;background:#f8f8f6;color:#888;border-radius:8px;font-family:inherit;font-weight:500}
.type-btn.in.active{background:#d8f0e4;color:#1a6a3a;border-color:#a8d5b8}
.type-btn.out.active{background:#fde8e6;color:#a0291e;border-color:#f5c6c0}
.table-wrap{overflow-x:auto}
#form-msg{margin-top:8px;font-size:13px;display:none}
optgroup{font-weight:600}
@media(max-width:600px){
  .form-row{grid-template-columns:1fr 1fr}
  .filter-bar{flex-direction:column;align-items:stretch}
  .filter-bar select,.filter-bar input{width:100%}
  .btn-row{flex-direction:column}
  .btn-row .btn{width:100%;text-align:center}
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>💰 Cashflow Tracker</h1>
    <p>Track daily income and expenses in USD &amp; KHR</p>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="showTab('add')">＋ Add</button>
    <button class="tab" onclick="showTab('transactions')">≡ Transactions</button>
    <button class="tab" onclick="showTab('summary')">▤ Summary</button>
  </div>

  <!-- ADD TAB -->
  <div id="tab-add">
    <div class="form-card">
      <div class="form-row" style="margin-bottom:12px">
        <div class="form-group" style="grid-column:1/-1">
          <label>Flow direction</label>
          <div class="type-toggle">
            <button class="type-btn in active" id="btn-in" onclick="setType('in')">▼ Money in</button>
            <button class="type-btn out" id="btn-out" onclick="setType('out')">▲ Money out</button>
          </div>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="f-date">
        </div>
        <div class="form-group">
          <label>Currency</label>
          <select id="f-currency">
            <option value="USD">USD ($)</option>
            <option value="KHR">KHR (៛)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Amount</label>
          <input type="number" id="f-amount" placeholder="0.00" min="0" step="0.01">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Payment method</label>
          <select id="f-method">
            <option value="bank">Bank</option>
            <option value="cash">Cash</option>
          </select>
        </div>
        <div class="form-group">
          <label>Category</label>
          <select id="f-category">
            <optgroup label="Salary">
              <option value="Salary-MTW">Salary-MTW</option>
              <option value="Salary-Church">Salary-Church</option>
              <option value="Salary-Management Fees">Salary-Management Fees</option>
              <option value="Salary-Wife">Salary-Wife</option>
            </optgroup>
            <optgroup label="Family">
              <option value="Mom Salary">Mom Salary</option>
              <option value="Dad Salary">Dad Salary</option>
              <option value="Sasda Tuition">Sasda Tuition</option>
              <option value="Sasda Other">Sasda Other Expenses</option>
              <option value="Hanan">Hanan</option>
              <option value="Wife's Expenses">Wife's Expenses</option>
            </optgroup>
            <optgroup label="Health">
              <option value="Treatment">Treatment</option>
              <option value="Vaccination">Vaccination</option>
              <option value="NSSF Health Insurance">NSSF Health Insurance</option>
            </optgroup>
            <optgroup label="Food &amp; Daily">
              <option value="Food">Food</option>
              <option value="Ingredient">Ingredient</option>
              <option value="Coffee">Coffee</option>
            </optgroup>
            <optgroup label="Loans">
              <option value="Car Loan">Car Loan</option>
              <option value="Land Loan">Land Loan</option>
            </optgroup>
            <optgroup label="Festivals">
              <option value="Phcum Ben Day">Phcum Ben Day</option>
              <option value="Khmer New Year">Khmer New Year</option>
              <option value="Water Festival Day">Water Festival Day</option>
            </optgroup>
            <optgroup label="Other">
              <option value="Petrol">Petrol</option>
              <option value="Clothes">Clothes</option>
              <option value="Giving">Giving</option>
              <option value="Offering">Offering</option>
              <option value="Others">Others</option>
            </optgroup>
          </select>
        </div>
        <div class="form-group">
          <label>Description</label>
          <input type="text" id="f-desc" placeholder="Optional note">
        </div>
      </div>
      <div class="btn-row" style="margin-top:6px">
        <button class="btn primary" onclick="addTransaction()">✓ Save transaction</button>
        <button class="btn" onclick="clearForm()">Clear</button>
      </div>
      <div id="form-msg"></div>
    </div>
  </div>

  <!-- TRANSACTIONS TAB -->
  <div id="tab-transactions" style="display:none">
    <div class="filter-bar">
      <select id="fil-period" onchange="renderTransactions()">
        <option value="1m">Last 1 month</option>
        <option value="3m">Last 3 months</option>
        <option value="6m">Last 6 months</option>
        <option value="1y">Last 1 year</option>
        <option value="all">All time</option>
      </select>
      <select id="fil-type" onchange="renderTransactions()">
        <option value="all">All flows</option>
        <option value="in">Money in</option>
        <option value="out">Money out</option>
      </select>
      <select id="fil-currency" onchange="renderTransactions()">
        <option value="all">All currencies</option>
        <option value="USD">USD only</option>
        <option value="KHR">KHR only</option>
      </select>
      <select id="fil-method" onchange="renderTransactions()">
        <option value="all">All methods</option>
        <option value="bank">Bank</option>
        <option value="cash">Cash</option>
      </select>
      <select id="fil-cat" onchange="renderTransactions()">
        <option value="all">All categories</option>
        <optgroup label="Salary">
          <option value="Salary-MTW">Salary-MTW</option>
          <option value="Salary-Church">Salary-Church</option>
          <option value="Salary-Management Fees">Salary-Management Fees</option>
          <option value="Salary-Wife">Salary-Wife</option>
        </optgroup>
        <optgroup label="Family">
          <option value="Mom Salary">Mom Salary</option>
          <option value="Dad Salary">Dad Salary</option>
          <option value="Sasda Tuition">Sasda Tuition</option>
          <option value="Sasda Other">Sasda Other Expenses</option>
          <option value="Hanan">Hanan</option>
          <option value="Wife's Expenses">Wife's Expenses</option>
        </optgroup>
        <optgroup label="Health">
          <option value="Treatment">Treatment</option>
          <option value="Vaccination">Vaccination</option>
          <option value="NSSF Health Insurance">NSSF Health Insurance</option>
        </optgroup>
        <optgroup label="Food &amp; Daily">
          <option value="Food">Food</option>
          <option value="Ingredient">Ingredient</option>
          <option value="Coffee">Coffee</option>
        </optgroup>
        <optgroup label="Loans">
          <option value="Car Loan">Car Loan</option>
          <option value="Land Loan">Land Loan</option>
        </optgroup>
        <optgroup label="Festivals">
          <option value="Phcum Ben Day">Phcum Ben Day</option>
          <option value="Khmer New Year">Khmer New Year</option>
          <option value="Water Festival Day">Water Festival Day</option>
        </optgroup>
        <optgroup label="Other">
          <option value="Petrol">Petrol</option>
          <option value="Clothes">Clothes</option>
          <option value="Giving">Giving</option>
          <option value="Offering">Offering</option>
          <option value="Others">Others</option>
        </optgroup>
      </select>
      <input type="text" id="fil-search" placeholder="Search..." oninput="renderTransactions()" style="min-width:120px">
    </div>
    <div class="btn-row" style="margin-bottom:1rem">
      <button class="btn success" onclick="exportExcel()">⬇ Export Excel</button>
      <button class="btn danger-btn" onclick="exportPDF()">⬇ Export PDF</button>
      <span id="tx-count" style="font-size:13px;color:#aaa;margin-left:4px"></span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Date</th><th>Category</th><th>Description</th><th>Method</th><th>Cur.</th><th>Flow</th><th>Amount</th><th></th>
          </tr>
        </thead>
        <tbody id="tx-body"></tbody>
      </table>
      <div id="tx-empty" class="empty" style="display:none">
        <span class="empty-icon">📭</span>No transactions found
      </div>
    </div>
  </div>

  <!-- SUMMARY TAB -->
  <div id="tab-summary" style="display:none">
    <div class="filter-bar">
      <select id="sum-period" onchange="renderSummary()">
        <option value="1m">Last 1 month</option>
        <option value="3m">Last 3 months</option>
        <option value="6m">Last 6 months</option>
        <option value="1y">Last 1 year</option>
        <option value="all">All time</option>
      </select>
      <button class="btn success" onclick="exportExcelSum()">⬇ Export Excel</button>
      <button class="btn danger-btn" onclick="exportPDFSum()">⬇ Export PDF</button>
    </div>
    <div id="summary-content"></div>
  </div>
</div>

<script>
const CATS=[
  'Salary-MTW','Salary-Church','Salary-Management Fees','Salary-Wife',
  'Mom Salary','Dad Salary','Sasda Tuition','Sasda Other','Hanan',"Wife's Expenses",
  'Treatment','Vaccination','NSSF Health Insurance',
  'Food','Ingredient','Coffee',
  'Car Loan','Land Loan',
  'Phcum Ben Day','Khmer New Year','Water Festival Day',
  'Petrol','Clothes','Giving','Offering','Others'
];
const CAT_LABELS={'Sasda Other':'Sasda Other Expenses'};
function catLabel(c){return CAT_LABELS[c]||c;}

const GROUPS=[
  {label:'Salary',cats:['Salary-MTW','Salary-Church','Salary-Management Fees','Salary-Wife']},
  {label:'Family',cats:['Mom Salary','Dad Salary','Sasda Tuition','Sasda Other','Hanan',"Wife's Expenses"]},
  {label:'Health',cats:['Treatment','Vaccination','NSSF Health Insurance']},
  {label:'Food & Daily',cats:['Food','Ingredient','Coffee']},
  {label:'Loans',cats:['Car Loan','Land Loan']},
  {label:'Festivals',cats:['Phcum Ben Day','Khmer New Year','Water Festival Day']},
  {label:'Other',cats:['Petrol','Clothes','Giving','Offering','Others']}
];

const STORAGE_KEY='cashflow_transactions';
let transactions=[];
let currentType='in';
let editingId=null;

function loadData(){
  try{const d=localStorage.getItem(STORAGE_KEY);if(d)transactions=JSON.parse(d);}catch(e){transactions=[];}
}
function saveData(){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(transactions));}catch(e){}
}

function setType(t){
  currentType=t;
  document.getElementById('btn-in').className='type-btn in'+(t==='in'?' active':'');
  document.getElementById('btn-out').className='type-btn out'+(t==='out'?' active':'');
}

function showTab(name){
  ['add','transactions','summary'].forEach(t=>{document.getElementById('tab-'+t).style.display=t===name?'block':'none';});
  document.querySelectorAll('.tab').forEach((el,i)=>{el.classList.toggle('active',['add','transactions','summary'][i]===name);});
  if(name==='transactions')renderTransactions();
  if(name==='summary')renderSummary();
}

function addTransaction(){
  const date=document.getElementById('f-date').value;
  const currency=document.getElementById('f-currency').value;
  const amount=parseFloat(document.getElementById('f-amount').value);
  const method=document.getElementById('f-method').value;
  const category=document.getElementById('f-category').value;
  const desc=document.getElementById('f-desc').value.trim();
  if(!date||isNaN(amount)||amount<=0){showMsg('Please enter a valid date and amount.',true);return;}
  transactions.unshift({id:Date.now(),date,currency,amount,method,category,desc,type:currentType});
  saveData();showMsg('Transaction saved!',false);
  document.getElementById('f-amount').value='';
  document.getElementById('f-desc').value='';
}

function showMsg(msg,isErr){
  const el=document.getElementById('form-msg');
  el.style.color=isErr?'#c0392b':'#1a7a4a';
  el.textContent=msg;el.style.display='block';
  setTimeout(()=>el.style.display='none',2500);
}

function clearForm(){
  document.getElementById('f-amount').value='';
  document.getElementById('f-desc').value='';
  document.getElementById('f-date').value=new Date().toISOString().split('T')[0];
}

function getDateBound(period){
  const now=new Date();
  if(period==='1m'){const d=new Date(now);d.setMonth(d.getMonth()-1);return d;}
  if(period==='3m'){const d=new Date(now);d.setMonth(d.getMonth()-3);return d;}
  if(period==='6m'){const d=new Date(now);d.setMonth(d.getMonth()-6);return d;}
  if(period==='1y'){const d=new Date(now);d.setFullYear(d.getFullYear()-1);return d;}
  return null;
}

function filterTx(period,type,currency,method,cat,search){
  const bound=getDateBound(period);
  return transactions.filter(tx=>{
    if(bound&&new Date(tx.date)<bound)return false;
    if(type!=='all'&&tx.type!==type)return false;
    if(currency!=='all'&&tx.currency!==currency)return false;
    if(method!=='all'&&tx.method!==method)return false;
    if(cat!=='all'&&tx.category!==cat)return false;
    if(search&&!(tx.desc+tx.category).toLowerCase().includes(search.toLowerCase()))return false;
    return true;
  });
}

function fmtAmt(tx){
  if(tx.currency==='USD')return '$'+tx.amount.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2});
  return '៛'+Math.round(tx.amount).toLocaleString('en');
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function catOptionsHtml(selected){
  return GROUPS.map(g=>`<optgroup label="${g.label}">${g.cats.map(c=>`<option value="${c}"${c===selected?' selected':''}>${catLabel(c)}</option>`).join('')}</optgroup>`).join('');
}

function renderTransactions(){
  const filtered=filterTx(
    document.getElementById('fil-period').value,
    document.getElementById('fil-type').value,
    document.getElementById('fil-currency').value,
    document.getElementById('fil-method').value,
    document.getElementById('fil-cat').value,
    document.getElementById('fil-search').value
  );
  document.getElementById('tx-count').textContent=filtered.length+' transaction'+(filtered.length!==1?'s':'');
  const body=document.getElementById('tx-body');
  const empty=document.getElementById('tx-empty');
  if(!filtered.length){body.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  body.innerHTML=filtered.map(tx=>{
    if(editingId===tx.id)return editRow(tx);
    return `<tr>
      <td style="white-space:nowrap">${tx.date}</td>
      <td style="white-space:nowrap">${esc(catLabel(tx.category))}</td>
      <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(tx.desc)}</td>
      <td><span class="badge ${tx.method}">${tx.method}</span></td>
      <td><span class="badge ${tx.currency}">${tx.currency}</span></td>
      <td><span class="badge ${tx.type}">${tx.type==='in'?'In':'Out'}</span></td>
      <td class="amount-${tx.type}" style="white-space:nowrap">${fmtAmt(tx)}</td>
      <td style="white-space:nowrap">
        <button class="btn" style="padding:4px 10px;font-size:12px" onclick="startEdit(${tx.id})">✏</button>
        <button class="btn" style="padding:4px 10px;font-size:12px;color:#c0392b" onclick="deleteTx(${tx.id})">🗑</button>
      </td>
    </tr>`;
  }).join('');
}

function editRow(tx){
  return `<tr style="background:#fafaf8">
    <td><input class="edit-input" type="date" id="e-date" value="${tx.date}" style="width:128px"></td>
    <td><select class="edit-input" id="e-cat" style="width:160px">${catOptionsHtml(tx.category)}</select></td>
    <td><input class="edit-input" type="text" id="e-desc" value="${esc(tx.desc)}" style="width:120px"></td>
    <td><select class="edit-input" id="e-method" style="width:72px">
      <option value="bank"${tx.method==='bank'?' selected':''}>Bank</option>
      <option value="cash"${tx.method==='cash'?' selected':''}>Cash</option>
    </select></td>
    <td><select class="edit-input" id="e-cur" style="width:68px">
      <option value="USD"${tx.currency==='USD'?' selected':''}>USD</option>
      <option value="KHR"${tx.currency==='KHR'?' selected':''}>KHR</option>
    </select></td>
    <td><select class="edit-input" id="e-type" style="width:64px">
      <option value="in"${tx.type==='in'?' selected':''}>In</option>
      <option value="out"${tx.type==='out'?' selected':''}>Out</option>
    </select></td>
    <td><input class="edit-input" type="number" id="e-amount" value="${tx.amount}" min="0" step="0.01" style="width:96px"></td>
    <td style="white-space:nowrap">
      <button class="btn primary" style="padding:4px 10px;font-size:12px" onclick="saveEdit(${tx.id})">✓</button>
      <button class="btn" style="padding:4px 10px;font-size:12px" onclick="cancelEdit()">✕</button>
    </td>
  </tr>`;
}

function startEdit(id){editingId=id;renderTransactions();}
function cancelEdit(){editingId=null;renderTransactions();}
function saveEdit(id){
  const idx=transactions.findIndex(t=>t.id===id);if(idx<0)return;
  const amount=parseFloat(document.getElementById('e-amount').value);
  if(isNaN(amount)||amount<=0)return;
  transactions[idx]={...transactions[idx],
    date:document.getElementById('e-date').value,
    category:document.getElementById('e-cat').value,
    desc:document.getElementById('e-desc').value,
    method:document.getElementById('e-method').value,
    currency:document.getElementById('e-cur').value,
    type:document.getElementById('e-type').value,
    amount};
  editingId=null;saveData();renderTransactions();
}

function deleteTx(id){
  if(!confirm('Delete this transaction?'))return;
  transactions=transactions.filter(t=>t.id!==id);saveData();renderTransactions();
}

function getSumFiltered(){
  return filterTx(document.getElementById('sum-period').value,'all','all','all','all','');
}

function renderSummary(){
  const filtered=getSumFiltered();
  const period=document.getElementById('sum-period').value;
  const usdIn=filtered.filter(t=>t.type==='in'&&t.currency==='USD').reduce((a,t)=>a+t.amount,0);
  const usdOut=filtered.filter(t=>t.type==='out'&&t.currency==='USD').reduce((a,t)=>a+t.amount,0);
  const khrIn=filtered.filter(t=>t.type==='in'&&t.currency==='KHR').reduce((a,t)=>a+t.amount,0);
  const khrOut=filtered.filter(t=>t.type==='out'&&t.currency==='KHR').reduce((a,t)=>a+t.amount,0);
  const bankCount=filtered.filter(t=>t.method==='bank').length;
  const cashCount=filtered.filter(t=>t.method==='cash').length;
  const periodLabel={'1m':'Last 1 month','3m':'Last 3 months','6m':'Last 6 months','1y':'Last 1 year','all':'All time'}[period];
  const uNet=usdIn-usdOut;const kNet=khrIn-khrOut;

  const catRows=CATS.map(cat=>{
    const uI=filtered.filter(t=>t.category===cat&&t.type==='in'&&t.currency==='USD').reduce((a,t)=>a+t.amount,0);
    const uO=filtered.filter(t=>t.category===cat&&t.type==='out'&&t.currency==='USD').reduce((a,t)=>a+t.amount,0);
    const kI=filtered.filter(t=>t.category===cat&&t.type==='in'&&t.currency==='KHR').reduce((a,t)=>a+t.amount,0);
    const kO=filtered.filter(t=>t.category===cat&&t.type==='out'&&t.currency==='KHR').reduce((a,t)=>a+t.amount,0);
    if(!uI&&!uO&&!kI&&!kO)return '';
    return `<tr>
      <td style="font-weight:500">${catLabel(cat)}</td>
      <td class="amount-in">${uI>0?'$'+uI.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2}):'-'}</td>
      <td class="amount-out">${uO>0?'$'+uO.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2}):'-'}</td>
      <td class="amount-in">${kI>0?'៛'+Math.round(kI).toLocaleString('en'):'-'}</td>
      <td class="amount-out">${kO>0?'៛'+Math.round(kO).toLocaleString('en'):'-'}</td>
    </tr>`;
  }).join('');

  document.getElementById('summary-content').innerHTML=`
    <p style="font-size:13px;color:#aaa;margin-bottom:1rem">${periodLabel} · ${filtered.length} transactions</p>
    <p class="section-title">USD</p>
    <div class="summary-grid">
      <div class="metric"><div class="metric-label">Total in</div><div class="metric-value income">$${usdIn.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2})}</div></div>
      <div class="metric"><div class="metric-label">Total out</div><div class="metric-value expense">$${usdOut.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2})}</div></div>
      <div class="metric"><div class="metric-label">Net</div><div class="metric-value ${uNet>=0?'pos':'neg'}">${uNet>=0?'+':''} $${uNet.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2})}</div></div>
    </div>
    <p class="section-title" style="margin-top:1.25rem">KHR</p>
    <div class="summary-grid">
      <div class="metric"><div class="metric-label">Total in</div><div class="metric-value income">៛${Math.round(khrIn).toLocaleString('en')}</div></div>
      <div class="metric"><div class="metric-label">Total out</div><div class="metric-value expense">៛${Math.round(khrOut).toLocaleString('en')}</div></div>
      <div class="metric"><div class="metric-label">Net</div><div class="metric-value ${kNet>=0?'pos':'neg'}">${kNet>=0?'+':''} ៛${Math.round(kNet).toLocaleString('en')}</div></div>
    </div>
    <p class="section-title" style="margin-top:1.25rem">Payment method</p>
    <div class="summary-grid">
      <div class="metric"><div class="metric-label">Bank</div><div class="metric-value">${bankCount}</div></div>
      <div class="metric"><div class="metric-label">Cash</div><div class="metric-value">${cashCount}</div></div>
    </div>
    <p class="section-title" style="margin-top:1.25rem">By category</p>
    <div class="table-wrap"><table>
      <thead><tr><th>Category</th><th>USD In</th><th>USD Out</th><th>KHR In</th><th>KHR Out</th></tr></thead>
      <tbody>${catRows||'<tr><td colspan="5" style="text-align:center;color:#bbb;padding:1.5rem">No data for this period</td></tr>'}</tbody>
    </table></div>`;
}

function getTxFiltered(){
  return filterTx(
    document.getElementById('fil-period').value,
    document.getElementById('fil-type').value,
    document.getElementById('fil-currency').value,
    document.getElementById('fil-method').value,
    document.getElementById('fil-cat').value,
    document.getElementById('fil-search').value
  );
}

function exportExcel(){doExcel(getTxFiltered());}
function exportExcelSum(){doExcel(getSumFiltered());}
function doExcel(data){
  if(!data.length){alert('No transactions to export.');return;}
  const rows=[['Date','Category','Description','Method','Currency','Flow','Amount']];
  data.forEach(t=>rows.push([t.date,catLabel(t.category),t.desc,t.method,t.currency,t.type==='in'?'In':'Out',t.amount]));
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[12,24,28,8,10,6,14].map(w=>({wch:w}));
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Transactions');
  XLSX.writeFile(wb,'cashflow_'+new Date().toISOString().split('T')[0]+'.xlsx');
}

function exportPDF(){doPDF(getTxFiltered());}
function exportPDFSum(){doPDF(getSumFiltered());}
function doPDF(data){
  if(!data.length){alert('No transactions to export.');return;}
  const rows=data.map(t=>`<tr>
    <td>${t.date}</td><td>${esc(catLabel(t.category))}</td><td>${esc(t.desc)}</td>
    <td>${t.method}</td><td>${t.currency}</td><td>${t.type==='in'?'In':'Out'}</td>
    <td style="text-align:right;color:${t.type==='in'?'#1a7a4a':'#c0392b'}">${fmtAmt(t)}</td>
  </tr>`).join('');
  const html=`<!DOCTYPE html><html><head><meta charset="utf-8"><title>Cashflow Report</title>
  <style>body{font-family:Arial,sans-serif;font-size:11px;color:#222;padding:20px}h1{font-size:16px;font-weight:600;margin-bottom:4px}p{color:#888;font-size:10px;margin-bottom:14px}table{width:100%;border-collapse:collapse}th{background:#f5f5f2;padding:6px 8px;text-align:left;font-size:10px;border-bottom:1px solid #ddd;text-transform:uppercase;letter-spacing:0.04em}td{padding:5px 8px;border-bottom:0.5px solid #eee;font-size:10px}</style>
  </head><body>
  <h1>Cashflow Report</h1>
  <p>Generated: ${new Date().toLocaleDateString('en-GB')} · ${data.length} transactions</p>
  <table><thead><tr><th>Date</th><th>Category</th><th>Description</th><th>Method</th><th>Cur.</th><th>Flow</th><th>Amount</th></tr></thead>
  <tbody>${rows}</tbody></table>
  <script>window.onload=function(){window.print();}<\/script></body></html>`;
  const w=window.open('','_blank');
  if(w){w.document.write(html);w.document.close();}
}

// Init
loadData();
document.getElementById('f-date').value=new Date().toISOString().split('T')[0];
</script>
