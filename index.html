<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Money Tracking">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f3460">
<link rel="manifest" href="manifest.json">
<title>Money Tracking</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:system-ui,-apple-system,'Hanuman','Khmer OS',sans-serif;background:#f8f8f6;color:#1a1a1a;
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
  padding-left:env(safe-area-inset-left);
  padding-right:env(safe-area-inset-right)}

.screen{display:none;height:100vh;height:100dvh;overflow:hidden;flex-direction:column}
.screen.active{display:flex}

/* PIN SCREEN */
#pin-screen{background:linear-gradient(160deg,#0d1b3e 0%,#0f3460 60%,#1a6a5a 100%);align-items:center;justify-content:center}
.pin-box{width:100%;max-width:340px;padding:2rem 1.5rem;display:flex;flex-direction:column;align-items:center;gap:1.25rem}
.pin-logo{width:110px;height:110px;border-radius:24px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
.pin-logo img{width:100%;height:100%;object-fit:cover}
.pin-name{font-size:22px;font-weight:700;color:#fff;margin-top:-4px}
.pin-sub{font-size:13px;color:rgba(255,255,255,0.55)}
.pin-dots{display:flex;gap:14px}
.dot{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,0.4);background:transparent;transition:all 0.15s}
.dot.filled{background:#fff;border-color:#fff}
.dot.error{background:#e74c3c;border-color:#e74c3c}
.pin-err{font-size:13px;color:#e74c3c;height:18px;text-align:center}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;max-width:260px}
.numpad button{height:62px;border-radius:50%;border:none;background:rgba(255,255,255,0.12);color:#fff;font-size:22px;font-weight:500;cursor:pointer;font-family:inherit;transition:background 0.1s}
.numpad button:active{background:rgba(255,255,255,0.3)}
.numpad .del{font-size:18px;background:rgba(255,255,255,0.06)}
.numpad .empty{background:transparent;pointer-events:none}
.lang-row{display:flex;gap:8px}
.lb{padding:5px 16px;border:1.5px solid rgba(255,255,255,0.3);border-radius:20px;font-size:13px;cursor:pointer;background:transparent;font-family:inherit;font-weight:500;color:rgba(255,255,255,0.6)}
.lb.active{border-color:#fff;color:#fff;background:rgba(255,255,255,0.15)}

/* APP SCREEN */
#app-screen{background:#f8f8f6}
.topbar{background:linear-gradient(90deg,#0d1b3e,#0f3460);color:#fff;padding:11px 1rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:8px}
.topbar-logo{width:28px;height:28px;border-radius:6px;overflow:hidden}
.topbar-logo img{width:100%;height:100%;object-fit:cover}
.topbar h1{font-size:15px;font-weight:700;letter-spacing:0.01em}
.topbar-r{display:flex;align-items:center;gap:6px}
.al{padding:3px 10px;border:1px solid rgba(255,255,255,0.3);border-radius:12px;font-size:12px;cursor:pointer;background:transparent;color:rgba(255,255,255,0.65);font-family:inherit}
.al.active{background:rgba(255,255,255,0.18);color:#fff;border-color:rgba(255,255,255,0.6)}
.lo-btn{padding:4px 10px;border:1px solid rgba(255,255,255,0.3);border-radius:12px;font-size:12px;cursor:pointer;background:transparent;color:rgba(255,255,255,0.8);font-family:inherit}

.app-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.wrap{max-width:900px;margin:0 auto;padding:1rem}
.tabs{display:flex;gap:2px;border-bottom:1px solid #e5e5e0;margin-bottom:1.25rem;overflow-x:auto}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:8px 13px;font-size:13px;cursor:pointer;border:none;background:none;color:#888;border-bottom:2px solid transparent;font-family:inherit;font-weight:500;white-space:nowrap}
.tab.active{color:#0f3460;border-bottom:2px solid #0f3460}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1.25rem}
.metric{background:#f0f0ec;border-radius:8px;padding:12px 14px}
.ml{font-size:12px;color:#888;margin-bottom:4px}
.mv{font-size:17px;font-weight:600}
.mv.inc{color:#1a7a4a}.mv.exp{color:#c0392b}.mv.pos{color:#1a7a4a}.mv.neg{color:#c0392b}
.stitle{font-size:11px;font-weight:600;color:#aaa;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.06em}
.card{background:#fff;border:1px solid #e5e5e0;border-radius:12px;padding:1.1rem;margin-bottom:1.25rem}
.fr{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:10px}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:12px;color:#888;font-weight:500}
.fg input,.fg select{font-size:14px;padding:9px 10px;border:1px solid #ddd;border-radius:8px;background:#f8f8f6;color:#1a1a1a;font-family:inherit}
.fg input:focus,.fg select:focus{outline:none;border-color:#0f3460;background:#fff}
.btn{padding:9px 16px;border-radius:8px;font-size:14px;cursor:pointer;border:1px solid #ddd;background:#fff;color:#1a1a1a;font-family:inherit;font-weight:500}
.btn:active{opacity:0.75}
.btn.p{background:linear-gradient(90deg,#0d1b3e,#0f3460);color:#fff;border:none}
.btn.s{color:#1a7a4a;border-color:#a8d5b8}
.btn.d{color:#c0392b;border-color:#f5c6c0}
.brow{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.fbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem;align-items:center}
.fbar select,.fbar input{font-size:13px;padding:7px 10px;border:1px solid #ddd;border-radius:8px;background:#f8f8f6;color:#1a1a1a;font-family:inherit}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:6px;font-weight:600;white-space:nowrap}
.badge.cash{background:#fef3d0;color:#a07000}
.badge.bank{background:#deeef9;color:#1a5a8a}
.badge.in{background:#d8f0e4;color:#1a6a3a}
.badge.out{background:#fde8e6;color:#a0291e}
.badge.USD,.badge.KHR{background:#f0f0ec;color:#666;border:1px solid #ddd}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;font-size:11px;font-weight:600;color:#aaa;border-bottom:1px solid #e5e5e0;white-space:nowrap;text-transform:uppercase;letter-spacing:0.04em}
td{padding:8px 10px;border-bottom:1px solid #f0f0ec;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf8}
.ai{color:#1a7a4a;font-weight:600}.ao{color:#c0392b;font-weight:600}
.ei{font-size:13px;padding:4px 8px;border:1px solid #ddd;border-radius:6px;background:#f8f8f6;color:#1a1a1a;font-family:inherit}
.empty{text-align:center;padding:3rem;color:#bbb;font-size:14px}
.tt{display:flex;gap:4px}
.tb{padding:8px 16px;font-size:13px;cursor:pointer;border:1px solid #ddd;background:#f8f8f6;color:#888;border-radius:8px;font-family:inherit;font-weight:500}
.tb.in.active{background:#d8f0e4;color:#1a6a3a;border-color:#a8d5b8}
.tb.out.active{background:#fde8e6;color:#a0291e;border-color:#f5c6c0}
.tw{overflow-x:auto;-webkit-overflow-scrolling:touch}
#fmsg{margin-top:8px;font-size:13px;display:none}
.urow{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0ec}
.urow:last-child{border-bottom:none}
.cat-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f5f5f5;font-size:13px}
.cat-row:last-child{border-bottom:none}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
.shake{animation:shake 0.4s ease}
</style>
</head>
