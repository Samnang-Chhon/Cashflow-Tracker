<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Money Tracking">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f3460">
<link rel="manifest" href="manifest.json">
<title>Money Tracking</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:system-ui,-apple-system,"Hanuman","Khmer OS",sans-serif;background:#f8f8f6;color:#1a1a1a;
  padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);
  padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right)}
.screen{display:none;height:100vh;height:100dvh;overflow:hidden;flex-direction:column}
.screen.active{display:flex}
#pin-screen{background:linear-gradient(160deg,#0d1b3e 0%,#0f3460 60%,#1a6a5a 100%);align-items:center;justify-content:center}
.pin-box{width:100%;max-width:340px;padding:2rem 1.5rem;display:flex;flex-direction:column;align-items:center;gap:1.1rem}
.pin-logo{width:100px;height:100px;border-radius:20px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.4);flex-shrink:0}
.pin-logo img{width:100%;height:100%;object-fit:cover}
.pin-name{font-size:22px;font-weight:700;color:#fff}
.pin-sub{font-size:13px;color:rgba(255,255,255,0.55)}
.pin-dots{display:flex;gap:14px}
.dot{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,0.4);background:transparent;transition:all 0.15s}
.dot.filled{background:#fff;border-color:#fff}
.dot.error{background:#e74c3c;border-color:#e74c3c}
.pin-err{font-size:13px;color:#e74c3c;height:18px;text-align:center;min-width:200px}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;max-width:260px}
.numpad button{height:62px;border-radius:50%;border:none;background:rgba(255,255,255,0.12);color:#fff;font-size:22px;font-weight:500;cursor:pointer;font-family:inherit;transition:background 0.1s;-webkit-appearance:none}
.numpad button:active{background:rgba(255,255,255,0.3)}
.numpad .del{font-size:18px;background:rgba(255,255,255,0.06)}
.numpad .empty{background:transparent;pointer-events:none}
.lang-row{display:flex;gap:8px}
.lb{padding:5px 16px;border:1.5px solid rgba(255,255,255,0.3);border-radius:20px;font-size:13px;cursor:pointer;background:transparent;font-family:inherit;font-weight:500;color:rgba(255,255,255,0.6);-webkit-appearance:none}
.lb.active{border-color:#fff;color:#fff;background:rgba(255,255,255,0.15)}
#app-screen{background:#f8f8f6}
.topbar{background:linear-gradient(90deg,#0d1b3e,#0f3460);color:#fff;padding:11px 1rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:8px}
.topbar-logo{width:28px;height:28px;border-radius:6px;overflow:hidden;flex-shrink:0}
.topbar-logo img{width:100%;height:100%;object-fit:cover}
.topbar h1{font-size:15px;font-weight:700}
.topbar-r{display:flex;align-items:center;gap:6px}
.al{padding:3px 10px;border:1px solid rgba(255,255,255,0.3);border-radius:12px;font-size:12px;cursor:pointer;background:transparent;color:rgba(255,255,255,0.65);font-family:inherit;-webkit-appearance:none}
.al.active{background:rgba(255,255,255,0.18);color:#fff;border-color:rgba(255,255,255,0.6)}
.lo-btn{padding:4px 10px;border:1px solid rgba(255,255,255,0.3);border-radius:12px;font-size:12px;cursor:pointer;background:transparent;color:rgba(255,255,255,0.8);font-family:inherit;-webkit-appearance:none}
.app-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.wrap{max-width:900px;margin:0 auto;padding:1rem}
.tabs{display:flex;gap:2px;border-bottom:1px solid #e5e5e0;margin-bottom:1.25rem;overflow-x:auto}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:8px 13px;font-size:13px;cursor:pointer;border:none;background:none;color:#888;border-bottom:2px solid transparent;font-family:inherit;font-weight:500;white-space:nowrap;-webkit-appearance:none}
.tab.active{color:#0f3460;border-bottom:2px solid #0f3460}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1.25rem}
.metric{background:#f0f0ec;border-radius:8px;padding:12px 14px}
.ml{font-size:12px;color:#888;margin-bottom:4px}
.mv{font-size:17px;font-weight:600}
.mv.inc{color:#1a7a4a}.mv.exp{color:#c0392b}.mv.pos{color:#1a7a4a}.mv.neg{color:#c0392b}
.stitle{font-size:11px;font-weight:600;color:#aaa;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.06em}
.card{background:#fff;border:1px solid #e5e5e0;border-radius:12px;padding:1.1rem;margin-bottom:1.25rem}
.fr{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:10px}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:12px;color:#888;font-weight:500}
.fg input,.fg select{font-size:14px;padding:9px 10px;border:1px solid #ddd;border-radius:8px;background:#f8f8f6;color:#1a1a1a;font-family:inherit;-webkit-appearance:none}
.fg input:focus,.fg select:focus{outline:none;border-color:#0f3460;background:#fff}
.btn{padding:9px 16px;border-radius:8px;font-size:14px;cursor:pointer;border:1px solid #ddd;background:#fff;color:#1a1a1a;font-family:inherit;font-weight:500;-webkit-appearance:none}
.btn:active{opacity:0.75}
.btn.p{background:linear-gradient(90deg,#0d1b3e,#0f3460);color:#fff;border:none}
.btn.s{color:#1a7a4a;border-color:#a8d5b8}
.btn.d{color:#c0392b;border-color:#f5c6c0}
.brow{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.fbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem;align-items:center}
.fbar select,.fbar input{font-size:13px;padding:7px 10px;border:1px solid #ddd;border-radius:8px;background:#f8f8f6;color:#1a1a1a;font-family:inherit;-webkit-appearance:none}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:6px;font-weight:600;white-space:nowrap}
.badge.cash{background:#fef3d0;color:#a07000}
.badge.bank{background:#deeef9;color:#1a5a8a}
.badge.in{background:#d8f0e4;color:#1a6a3a}
.badge.out{background:#fde8e6;color:#a0291e}
.badge.USD,.badge.KHR{background:#f0f0ec;color:#666;border:1px solid #ddd}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;font-size:11px;font-weight:600;color:#aaa;border-bottom:1px solid #e5e5e0;white-space:nowrap;text-transform:uppercase;letter-spacing:0.04em}
td{padding:8px 10px;border-bottom:1px solid #f0f0ec;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf8}
.ai{color:#1a7a4a;font-weight:600}.ao{color:#c0392b;font-weight:600}
.ei{font-size:13px;padding:4px 8px;border:1px solid #ddd;border-radius:6px;background:#f8f8f6;color:#1a1a1a;font-family:inherit}
.empty{text-align:center;padding:3rem;color:#bbb;font-size:14px}
.tt{display:flex;gap:4px}
.tb{padding:8px 16px;font-size:13px;cursor:pointer;border:1px solid #ddd;background:#f8f8f6;color:#888;border-radius:8px;font-family:inherit;font-weight:500;-webkit-appearance:none}
.tb.in.active{background:#d8f0e4;color:#1a6a3a;border-color:#a8d5b8}
.tb.out.active{background:#fde8e6;color:#a0291e;border-color:#f5c6c0}
.tw{overflow-x:auto;-webkit-overflow-scrolling:touch}
#fmsg{margin-top:8px;font-size:13px;display:none}
.urow{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0ec}
.urow:last-child{border-bottom:none}
.cat-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f5f5f5;font-size:13px}
.cat-row:last-child{border-bottom:none}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
.shake{animation:shake 0.4s ease}
</style>
</head>

  <div class="app-body">
    <div class="wrap">
      <div class="tabs">
        <button class="tab active" id="tb-add" onclick="showTab('add')">+ Add</button>
        <button class="tab" id="tb-tx" onclick="showTab('tx')">≡ Transactions</button>
        <button class="tab" id="tb-sum" onclick="showTab('sum')">▤ Summary</button>
        <button class="tab" id="tb-set" onclick="showTab('set')">⚙ Settings</button>
      </div>

      <div id="pn-add">
        <div class="card">
          <div class="fr" style="margin-bottom:12px">
            <div class="fg" style="grid-column:1/-1">
              <label id="lb-flow">Flow direction</label>
              <div class="tt">
                <button class="tb in active" id="bi" onclick="setType('in')">▼ Money in</button>
                <button class="tb out" id="bo" onclick="setType('out')">▲ Money out</button>
              </div>
            </div>
          </div>
          <div class="fr">
            <div class="fg"><label id="lb-dt">Date</label><input type="date" id="fd"></div>
            <div class="fg"><label id="lb-cu">Currency</label>
              <select id="fcu"><option value="USD">USD ($)</option><option value="KHR">KHR (&#x17DB;)</option></select>
            </div>
            <div class="fg"><label id="lb-am">Amount</label><input type="number" id="fam" placeholder="0.00" min="0" step="0.01" inputmode="decimal"></div>
          </div>
          <div class="fr">
            <div class="fg"><label id="lb-me">Payment method</label>
              <select id="fme"><option value="bank" id="ob">Bank</option><option value="cash" id="oc">Cash</option></select>
            </div>
            <div class="fg"><label id="lb-ca">Category</label><select id="fca"></select></div>
            <div class="fg"><label id="lb-de">Description</label><input type="text" id="fde" placeholder="Optional note"></div>
          </div>
          <div class="brow" style="margin-top:6px">
            <button class="btn p" id="bs" onclick="addTx()">&#10003; Save</button>
            <button class="btn" id="bc" onclick="clrForm()">Clear</button>
          </div>
          <div id="fmsg"></div>
        </div>
      </div>

      <div id="pn-tx" style="display:none">
        <div class="fbar">
          <select id="fp" onchange="renderTx()">
            <option value="1m" id="p1m">Last 1 month</option>
            <option value="3m" id="p3m">Last 3 months</option>
            <option value="6m" id="p6m">Last 6 months</option>
            <option value="1y" id="p1y">Last 1 year</option>
            <option value="all" id="pall">All time</option>
          </select>
          <select id="ft" onchange="renderTx()">
            <option value="all" id="fall">All flows</option>
            <option value="in" id="fin">Money in</option>
            <option value="out" id="fou">Money out</option>
          </select>
          <select id="fc" onchange="renderTx()">
            <option value="all" id="fcall">All currencies</option>
            <option value="USD">USD</option><option value="KHR">KHR</option>
          </select>
          <select id="fm" onchange="renderTx()">
            <option value="all" id="fmall">All methods</option>
            <option value="bank" id="ob2">Bank</option>
            <option value="cash" id="oc2">Cash</option>
          </select>
          <select id="fcat" onchange="renderTx()"></select>
          <input type="text" id="fsr" oninput="renderTx()" placeholder="Search..." style="min-width:100px">
        </div>
        <div class="brow" style="margin-bottom:1rem">
          <button class="btn s" onclick="exXL(false)">&#8595; Excel</button>
          <button class="btn d" onclick="exPDF(false)">&#8595; PDF</button>
          <span id="txc" style="font-size:13px;color:#aaa;margin-left:4px"></span>
        </div>
        <div class="tw">
          <table>
            <thead><tr>
              <th id="hdt">Date</th><th id="hca">Category</th><th id="hde">Desc.</th>
              <th id="hme">Method</th><th>Cur.</th><th id="hfl">Flow</th><th id="ham">Amount</th><th></th>
            </tr></thead>
            <tbody id="txb"></tbody>
          </table>
          <div id="txe" class="empty" style="display:none"><div style="font-size:36px;margin-bottom:8px">&#128237;</div><span id="notx">No transactions</span></div>
        </div>
      </div>

      <div id="pn-sum" style="display:none">
        <div class="fbar">
          <select id="sp" onchange="renderSum()">
            <option value="1m" id="sp1m">Last 1 month</option>
            <option value="3m" id="sp3m">Last 3 months</option>
            <option value="6m" id="sp6m">Last 6 months</option>
            <option value="1y" id="sp1y">Last 1 year</option>
            <option value="all" id="spall">All time</option>
          </select>
          <button class="btn s" onclick="exXL(true)">&#8595; Excel</button>
          <button class="btn d" onclick="exPDF(true)">&#8595; PDF</button>
        </div>
        <div id="sumc"></div>
      </div>

      <div id="pn-set" style="display:none">
        <div class="card">
          <div class="stitle" id="set-pin-t">Change PIN</div>
          <p style="font-size:13px;color:#888;margin-bottom:12px" id="set-pin-s">Enter a new 4-digit PIN</p>
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            <input type="password" id="new-pin" maxlength="4" placeholder="&#8226;&#8226;&#8226;&#8226;" inputmode="numeric" pattern="[0-9]*"
              style="font-size:26px;letter-spacing:10px;width:110px;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-family:inherit;background:#f8f8f6;text-align:center">
            <button class="btn p" id="set-pin-btn" onclick="changePIN()">Save PIN</button>
          </div>
          <div id="pin-change-msg" style="margin-top:8px;font-size:13px;display:none"></div>
        </div>
        <div class="card">
          <div class="stitle" id="cat-mgr-t">Manage Categories</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:flex-end">
            <div class="fg" style="flex:1;min-width:120px">
              <label id="new-cat-lbl">Name (EN)</label>
              <input type="text" id="new-cat-en" placeholder="e.g. Gym">
            </div>
            <div class="fg" style="flex:1;min-width:120px">
              <label id="new-cat-lbl-km">ឈ្មោះ (ខ្មែរ)</label>
              <input type="text" id="new-cat-km" placeholder="ឧ. កីឡា">
            </div>
            <div class="fg" style="min-width:120px">
              <label id="new-cat-grp-lbl">Group</label>
              <select id="new-cat-grp">
                <option value="Salary">Salary</option>
                <option value="Family">Family</option>
                <option value="Health">Health</option>
                <option value="Food">Food &amp; Daily</option>
                <option value="Loans">Loans</option>
                <option value="Festivals">Festivals</option>
                <option value="Other" selected>Other</option>
              </select>
            </div>
            <button class="btn p" id="add-cat-btn" onclick="addCategory()">+ Add</button>
          </div>
          <div id="cat-list"></div>
        </div>
      </div>

    </div>
  </div>
</div>

  for(var i=0;i<4;i++){

    else if(i<pinEntry.length)d.classList.add('filled');

function bnd(period){
  var n=new Date();
  if(period==='1m'){var d=new Date(n);d.setMonth(d.getMonth()-1);return d;}
  if(period==='3m'){var d=new Date(n);d.setMonth(d.getMonth()-3);return d;}
  if(period==='6m'){var d=new Date(n);d.setMonth(d.getMonth()-6);return d;}
  if(period==='1y'){var d=new Date(n);d.setFullYear(d.getFullYear()-1);return d;}
  return null;
}
function filterTX(period,type,cur,method,cat,sr){
  var b=bnd(period);
  return TX.filter(function(x){
    if(b&&new Date(x.date)<b)return false;
    if(type!=='all'&&x.type!==type)return false;
    if(cur!=='all'&&x.currency!==cur)return false;
    if(method!=='all'&&x.method!==method)return false;
    if(cat!=='all'&&x.category!==cat)return false;
    if(sr&&!(x.desc+cl(x.category)).toLowerCase().includes(sr.toLowerCase()))return false;
    return true;
  });
}
function fmt(x){
  if(x.currency==='USD')return '$'+x.amount.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2});
  return '៛'+Math.round(x.amount).toLocaleString('en');
}

  var kO=rows.filter(function(x){return x.type==='out'&&x.currency==='KHR';}).reduce(function(a,x){return a+x.amount;},0);
  var bk=rows.filter(function(x){return x.method==='bank';}).length,ca=rows.filter(function(x){return x.method==='cash';}).length;
  var uN=uI-uO,kN=kI-kO;
  var cats=allCats();
  var catRows=cats.map(function(cat){
    var a=rows.filter(function(x){return x.category===cat.key&&x.type==='in'&&x.currency==='USD';}).reduce(function(s,x){return s+x.amount;},0);
    var b=rows.filter(function(x){return x.category===cat.key&&x.type==='out'&&x.currency==='USD';}).reduce(function(s,x){return s+x.amount;},0);
    var c=rows.filter(function(x){return x.category===cat.key&&x.type==='in'&&x.currency==='KHR';}).reduce(function(s,x){return s+x.amount;},0);
    var d=rows.filter(function(x){return x.category===cat.key&&x.type==='out'&&x.currency==='KHR';}).reduce(function(s,x){return s+x.amount;},0);
    if(!a&&!b&&!c&&!d)return '';
    return '<tr><td style="font-weight:500">'+(L==='km'?cat.km:cat.en)+'</td><td class="ai">'+(a>0?'$'+a.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2}):'-')+'</td><td class="ao">'+(b>0?'$'+b.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2}):'-')+'</td><td class="ai">'+(c>0?'៛'+Math.round(c).toLocaleString('en'):'-')+'</td><td class="ao">'+(d>0?'៛'+Math.round(d).toLocaleString('en'):'-')+'</td></tr>';
  }).join('');
  document.getElementById('sumc').innerHTML='<p style="font-size:13px;color:#aaa;margin-bottom:1rem">'+TR[L].pl[period]+' &middot; '+t('txn')(rows.length)+'</p><p class="stitle">USD</p><div class="sg"><div class="metric"><div class="ml">'+t('tin')+'</div><div class="mv inc">$'+uI.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2})+'</div></div><div class="metric"><div class="ml">'+t('tout')+'</div><div class="mv exp">$'+uO.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2})+'</div></div><div class="metric"><div class="ml">'+t('net')+'</div><div class="mv '+(uN>=0?'pos':'neg')+'">'+(uN>=0?'+':'')+' $'+uN.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2})+'</div></div></div><p class="stitle" style="margin-top:1.25rem">KHR</p><div class="sg"><div class="metric"><div class="ml">'+t('tin')+'</div><div class="mv inc">៛'+Math.round(kI).toLocaleString('en')+'</div></div><div class="metric"><div class="ml">'+t('tout')+'</div><div class="mv exp">៛'+Math.round(kO).toLocaleString('en')+'</div></div><div class="metric"><div class="ml">'+t('net')+'</div><div class="mv '+(kN>=0?'pos':'neg')+'">'+(kN>=0?'+':'')+' ៛'+Math.round(kN).toLocaleString('en')+'</div></div></div><p class="stitle" style="margin-top:1.25rem">'+t('spay')+'</p><div class="sg"><div class="metric"><div class="ml">'+t('sbank')+'</div><div class="mv">'+bk+'</div></div><div class="metric"><div class="ml">'+t('scash')+'</div><div class="mv">'+ca+'</div></div></div><p class="stitle" style="margin-top:1.25rem">'+t('scat')+'</p><div class="tw"><table><thead><tr><th>'+t('hca')+'</th><th>'+t('udin')+'</th><th>'+t('udout')+'</th><th>'+t('khin')+'</th><th>'+t('khout')+'</th></tr></thead><tbody>'+(catRows||'<tr><td colspan="5" style="text-align:center;color:#bbb;padding:1.5rem">-</td></tr>')+'</tbody></table></div>';
}
function exXL(fromSum){
  var data=fromSum?getSumF():getTxF();if(!data.length){alert(t('notx'));return;}
  var rows=[[t('hdt'),t('hca'),t('hde'),t('hme'),'Currency',t('hfl'),t('ham')]];
  data.forEach(function(x){rows.push([x.date,cl(x.category),x.desc,x.method==='bank'?t('ob'):t('oc'),x.currency,x.type==='in'?t('fin'):t('fou'),x.amount]);});
  var ws=XLSX.utils.aoa_to_sheet(rows);ws['!cols']=[12,24,28,10,10,8,14].map(function(w){return{wch:w};});
  var wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Transactions');
  XLSX.writeFile(wb,'cashflow_'+new Date().toISOString().split('T')[0]+'.xlsx');
}

  var w=window.open('','_blank');if(w){w.document.write(html);w.document.close();}
}
